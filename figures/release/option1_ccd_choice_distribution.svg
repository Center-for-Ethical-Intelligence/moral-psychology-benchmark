<text x="72" y="948" class="tiny">HOW TO READ THE CCD HEATMAP</text>
<text x="72" y="972" class="body">The baseline is 10% because the paper offers ten canonical cluster options. `+5.0` means a line selected that cluster five percentage points more often than uniform choice; `-3.0` means three points less often.</text>
<text x="72" y="998" class="body">`Top cluster share` is the line&apos;s most frequent cluster share among valid visible selections. `Effective clusters` is the inverse concentration count: lower means more concentrated, higher means more spread out.</text>
<text x="72" y="1024" class="body">No explicit rationale tags are retained in the public archive, so this figure stays with choice behavior only. The appendix coverage figure still reports whether a valid visible CCD choice surfaced at all.</text>
