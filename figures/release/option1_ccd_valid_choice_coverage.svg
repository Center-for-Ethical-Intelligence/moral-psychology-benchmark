<text x="72" y="822" class="tiny">CCD COVERAGE INTERPRETATION</text>
<text x="72" y="846" class="body">Coverage = (# saved visible answers with a parseable 1-10 CCD choice) / (# all CCD-Bench prompts). This is a surfaced-choice coverage metric, not a universal correctness score.</text>
