<text x="72" y="820" class="tiny">HOW TO READ THIS FIGURE</text>
<text x="72" y="844" class="body">Dominant-cluster share = max(cluster share) among valid visible selections. Effective clusters = 1 / sum(p²). The first tells you how much one cluster dominates; the second tells you how broadly the line spreads its CCD choices.</text>
