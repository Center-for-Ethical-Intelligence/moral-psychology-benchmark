<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 446" role="img" preserveAspectRatio="xMidYMin meet" style="max-width:100%;height:auto">
<defs>
<linearGradient id="panelGradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#ffffff"/>
<stop offset="100%" stop-color="#f8fafc"/>
</linearGradient>
<pattern id="diagonalHatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
<line x1="0" y1="0" x2="0" y2="8" stroke="#cdd6e1" stroke-width="3"/>
</pattern>
<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#9fb0c2" flood-opacity="0.18"/>
</filter>
<style>
.canvas { fill: #f3f6fa; }
.title { font: 700 26px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #12263a; }
.subtitle { font: 400 14px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #5c6b7a; }
.axis { font: 600 14px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #22313f; }
.label { font: 500 13px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #22313f; }
.metric { font: 700 20px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #12263a; }
.celltext { font: 700 16px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #ffffff; }
.celltext-dark { font: 700 16px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #173042; }
.cellsub { font: 500 11px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: rgba(255,255,255,0.88); }
.cellsub-dark { font: 600 11px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #385062; }
.body { font: 500 12px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #22313f; }
.small { font: 500 11px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #5c6b7a; }
.tiny { font: 600 10px 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif; fill: #6b7c8f; letter-spacing: 0.04em; }
.grid { fill: #ffffff; stroke: #d7dee6; stroke-width: 1.25; }
.panel { fill: url(#panelGradient); stroke: #dbe4ee; stroke-width: 1.25; filter: url(#softShadow); }
.subpanel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; }
.legend-card { fill: #ffffff; stroke: #dbe4ee; stroke-width: 1; }
.guide { stroke: #d7dee6; stroke-width: 1; stroke-dasharray: 4 6; }
.baseline { stroke: #aab7c6; stroke-width: 1.1; }
.muted-cell { fill: #eef2f7; stroke: #d7dee6; stroke-width: 1; }
.muted-bar { fill: #ecf1f6; stroke: #d7dee6; stroke-width: 1; }
.outline { stroke: rgba(255,255,255,0.9); stroke-width: 1; }
</style>
</defs>
<rect x="0" y="0" width="1520" height="446" class="canvas"/>
<rect x="24" y="24" width="1472" height="398" rx="22" class="panel"/>
<title>Appendix explanation: DeNEVIL proxy pipeline</title>
<desc>Supporting appendix diagram explaining how the public DeNEVIL release package moves from the paper's MoralPrompt goal to the current FULCRA-backed proxy evidence package, and why the public output is coverage and provenance rather than ethical-quality accuracy.</desc>
<text x="48" y="64" class="title">Appendix explanation: DeNEVIL proxy pipeline</text>
<text x="48" y="88" class="subtitle">Supporting appendix only. This diagram is the high-level contract for the public DeNEVIL package: it shows what the paper asks for, what is unavailable locally, what the repo actually runs, and what claims the public release is allowed to make.</text>
<rect x="56" y="174" width="248" height="112" rx="20" fill="#e8f0fb" stroke="#dbe4ee" stroke-width="1.25"/>
<text x="76" y="202" class="axis">Denevil paper goal</text>
<text x="76" y="224" class="body">Use MoralPrompt to elicit ethical</text>
<text x="76" y="242" class="body">value-vulnerability traces in a</text>
<text x="76" y="260" class="body">benchmark-faithful generative</text>
<text x="76" y="278" class="body">setting.</text>
<line x1="312" y1="230.00" x2="322" y2="230.00" class="baseline"/>
<polygon points="322,224.00 322,236.00 334,230.00" fill="#94a3b8"/>
<rect x="338" y="174" width="248" height="112" rx="20" fill="#fef3c7" stroke="#dbe4ee" stroke-width="1.25"/>
<text x="358" y="202" class="axis">Local limitation</text>
<text x="358" y="224" class="body">The repo does not currently have a</text>
<text x="358" y="242" class="body">stable local MoralPrompt export,</text>
<text x="358" y="260" class="body">so paper-faithful scoring is</text>
<text x="358" y="278" class="body">unavailable.</text>
<line x1="594" y1="230.00" x2="604" y2="230.00" class="baseline"/>
<polygon points="604,224.00 604,236.00 616,230.00" fill="#94a3b8"/>
<rect x="620" y="174" width="248" height="112" rx="20" fill="#e8f7ef" stroke="#dbe4ee" stroke-width="1.25"/>
<text x="640" y="202" class="axis">Implemented release path</text>
<text x="640" y="224" class="body">Run the FULCRA-backed proxy prompt</text>
<text x="640" y="242" class="body">set and persist the generated</text>
<text x="640" y="260" class="body">proxy answers plus source</text>
<text x="640" y="278" class="body">metadata.</text>
<line x1="876" y1="230.00" x2="886" y2="230.00" class="baseline"/>
<polygon points="886,224.00 886,236.00 898,230.00" fill="#94a3b8"/>
<rect x="902" y="174" width="248" height="112" rx="20" fill="#f5f3ff" stroke="#dbe4ee" stroke-width="1.25"/>
<text x="922" y="202" class="axis">Observed public evidence</text>
<text x="922" y="224" class="body">Inspect `.eval` artifacts retain</text>
<text x="922" y="242" class="body">saved visible proxy answers, value</text>
<text x="922" y="260" class="body">tags, prompt provenance, route</text>
<text x="922" y="278" class="body">names, and timestamps.</text>
<line x1="1158" y1="230.00" x2="1168" y2="230.00" class="baseline"/>
<polygon points="1168,224.00 1168,236.00 1180,230.00" fill="#94a3b8"/>
<rect x="1184" y="174" width="248" height="112" rx="20" fill="#fff7ed" stroke="#dbe4ee" stroke-width="1.25"/>
<text x="1204" y="202" class="axis">PI-facing deliverable</text>
<text x="1204" y="224" class="body">Report coverage and traceability</text>
<text x="1204" y="242" class="body">evidence only: status, checkpoint</text>
<text x="1204" y="260" class="body">%, visible response rate, sample</text>
<text x="1204" y="278" class="body">volume, and safe examples — not</text>
<text x="1204" y="296" class="body">accuracy.</text>
<rect x="48" y="344" width="1424" height="58" rx="18" class="legend-card"/>
<text x="72" y="368" class="tiny">LIMITATION BOUNDARY</text>
<text x="72" y="390" class="body">Proxy-only coverage and traceability evidence; MoralPrompt unavailable; not benchmark-faithful ethical-quality scoring. The proxy is still useful because it keeps route provenance, saved visible answers, and completion state comparable across model lines.</text>
</svg>
